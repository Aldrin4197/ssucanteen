<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSU Canteen - Login</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            color: #333;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 420px;
            margin: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            body::before {
                background: rgba(0, 0, 0, 0.5);
            }
            
            .login-container {
                padding: 36px 28px;
                margin: 0;
                border-radius: 16px;
                max-width: 100%;
            }
            
            .login-header h1 {
                font-size: 26px;
            }
            
            .login-header h1 i {
                width: 28px !important;
                height: 28px !important;
            }
            
            button {
                padding: 14px 16px;
                font-size: 16px;
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-login {
            background: #667eea;
            color: white;
            grid-column: 1 / 2;
        }

        .btn-login:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }



        .btn-login:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #dc2626;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            padding: 10px 12px;
            background: #fee2e2;
            border-radius: 6px;
            border-left: 4px solid #dc2626;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #059669;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            padding: 10px 12px;
            background: #ecfdf5;
            border-radius: 6px;
            border-left: 4px solid #059669;
        }

        .success-message.show {
            display: block;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .toggle-form a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }



        .form-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #0f172a;
        }

        .form-description {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
        }

        .role-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            line-height: 1.5;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f4f6;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- LOGIN FORM -->
        <div class="login-form">
            <div class="login-header">
                <h1><i data-lucide="utensils" style="width: 32px; height: 32px; color: hsla(214, 8%, 33%, 0.692);"></i> <span style="color: #60a5fa;">SSU</span> <span style="color: #000000;">Canteen</span></h1>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" name="username" required placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" required placeholder="••••••••">
                </div>

                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>

                <button type="submit" class="btn-login" id="loginBtn" style="width: 100%;">Login</button>
            </form>
        </div>
    </div>

    <script>

        function clearMessages() {
            document.querySelectorAll('.error-message, .success-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
        }

        // LOGIN HANDLER
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('loginError');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span>Logging in...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Redirect based on role
                    if (data.role === 'pos') {
                        window.location.href = '/pos.html';
                    } else if (data.role === 'super-admin') {
                        window.location.href = '/super-admin.html';
                    } else {
                        window.location.href = '/index.html';
                    }
                } else {
                    errorEl.textContent = data.message || 'Login failed. Please try again.';
                    errorEl.classList.add('show');
                }
            } catch (error) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        // Check if already logged in
        fetch('/api/check-session')
            .then(r => r.json())
            .then(data => {
                if (data.authenticated) {
                    // Redirect based on role
                    if (data.role === 'pos') {
                        window.location.href = '/pos.html';
                    } else if (data.role === 'super-admin') {
                        window.location.href = '/super-admin.html';
                    } else {
                        window.location.href = '/index.html';
                    }
                }
            })
            .catch(() => {
                // Not logged in, stay on login page
            });

        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
