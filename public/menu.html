<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSU Canteen | Today's Menu</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-primary: #ea580c; /* Appetizing modern orange */
            --accent-secondary: #f97316;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.04);
            --shadow-hover: 0 10px 25px rgba(234, 88, 12, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            min-height: 100dvh;
        }

        /* --- Minimalist Header / Hero --- */
        .header {
            padding: 16px 20px 4px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: left;
        }

        .header .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .status-banner {
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            max-width: 1200px;
            min-height: 48vh;
            margin: 12px auto 20px;
            padding: 24px 20px;
            border-radius: 22px;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .status-banner.active {
            display: flex;
        }

        .status-banner h2 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            color: #9a3412;
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        /* --- Main Container --- */
        .container {
            max-width: 1200px;
            margin: 0 auto 36px;
            padding: 0 20px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 8px 0 12px;
            color: var(--text-main);
        }

        .section-title i {
            color: var(--text-muted);
        }

        /* --- Category Cards (Snacks/Drinks) --- */
        .cat-cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .cat-card {
            background: var(--surface-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .cat-card:hover {
            border-color: var(--accent-secondary);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .cat-card .icon-wrapper {
            background: #fff7ed;
            color: var(--accent-primary);
            padding: 12px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cat-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .cat-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
        }

        /* --- Menu Grid (Meals) --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .food-card {
            background: var(--surface-color);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid transparent;
        }

        .food-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(234, 88, 12, 0.2);
        }

        .food-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--bg-color);
        }

        .food-card .info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .food-card .name {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .food-card .price {
            color: #04af43;
            font-weight: 800;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        /* --- Glassmorphism Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 4000;
            opacity: 0;
            animation: fadeIn 0.2s forwards;
            padding: 20px;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .modal-box {
            background: var(--surface-color);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: translateY(20px);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            text-transform: capitalize;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.02em;
        }

        .modal-header button {
            background: var(--bg-color);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
        }

        .modal-header button:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .cat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .cat-item:last-child {
            border-bottom: none;
        }

        .cat-item .item-name {
            font-weight: 500;
            color: var(--text-main);
            font-size: 1.05rem;
        }

        .cat-item .item-price {
            font-weight: 700;
            color:  #04af43;
            font-size: 1.1rem;
            background: #fff7ed;
            padding: 4px 10px;
            border-radius: 8px;
        }

        /* --- Empty State --- */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: var(--surface-color);
            border-radius: 20px;
            border: 1px dashed var(--border-color);
        }

        .menu-footer-note {
            max-width: 1200px;
            margin: 0 auto 42px;
            padding: 0 20px;
        }

        .menu-footer-note-card {
            display: none;
            align-items: flex-start;
            gap: 14px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
        }

        .menu-footer-note-card.active {
            display: flex;
        }

        .menu-footer-note-card i {
            color: #0284c7;
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .menu-footer-note-card h3 {
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .menu-footer-note-card p {
            color: var(--text-muted);
            line-height: 1.6;
            white-space: pre-line;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .header {
                padding: max(10px, env(safe-area-inset-top)) 16px 4px;
            }

            .header h1 {
                font-size: 1.35rem;
            }

            .header .logo {
                margin-bottom: 6px;
            }

            .container {
                margin: 0 auto 24px;
                padding: 0 16px;
            }

            .section-title {
                margin: 10px 0 10px;
                font-size: 1.1rem;
            }

            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .food-card {
                border-radius: 16px;
            }

            .food-card img {
                height: 140px;
                border-radius: 16px 16px 0 0;
            }

            .food-card .info {
                padding: 12px;
            }

            .food-card .name {
                font-size: 0.95rem;
                margin-bottom: 8px;
            }

            .food-card .price {
                font-size: 1.1rem;
            }

            .cat-cards-container {
                grid-template-columns: 1fr;
            }

            .status-banner {
                margin: 12px 16px 18px;
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo">
            <img src="/download.png" alt="SSU Canteen Logo" style="width: 80px; height: auto; object-fit: contain;">
            
            <span style="color: #0284c7; font-size: 2rem; font-weight: 800;">SSU</span> 
            <span style="color: #000000; font-size: 2rem; font-weight: 800;">Canteen</span>
        </div>
        <h1>Today's Menu</h1>
    </div>

    <div id="canteenClosedBanner" class="status-banner">
        <h2>Canteen is currently closed</h2>
    </div>

    <div class="container">
        <div id="menuContent">

        <h2 class="section-title">
            <i data-lucide="chef-hat" style="width: 24px; height: 24px;"></i>Meals
        </h2>
        <div class="menu-grid" id="customerMenu"></div>

        <h2 class="section-title" style="margin-top: 20px;">
            <i data-lucide="donut" style="width: 24px; height: 24px;"></i> Snacks & Drinks
        </h2>
        <div id="categoryContainer" class="cat-cards-container">
        </div>
        </div>

    </div>

    <div class="menu-footer-note">
        <div id="menuContactCard" class="menu-footer-note-card">
            <i data-lucide="message-circle-more"></i>
            <div>
                <h3>You can contact:</h3>
                <p id="menuContactText"></p>
            </div>
        </div>
    </div>

    <script>
        // Store categories
        let categoryData = { snacks: [], drinks: [] };
        let menuPageSettings = {
            isOpen: true,
            contactInfo: ''
        };
        let realtimeSource;

        function applyMenuPageSettings() {
            const isOpen = menuPageSettings.isOpen !== false;
            const banner = document.getElementById('canteenClosedBanner');
            const menuContent = document.getElementById('menuContent');
            const contactCard = document.getElementById('menuContactCard');
            const contactText = document.getElementById('menuContactText');
            const contactInfo = (menuPageSettings.contactInfo || '').trim();

            banner.classList.toggle('active', !isOpen);
            menuContent.style.display = isOpen ? '' : 'none';
            contactCard.classList.toggle('active', isOpen && Boolean(contactInfo));
            contactText.textContent = contactInfo;

            lucide.createIcons();
        }

        async function loadMenuPageSettings() {
            try {
                const res = await fetch('/menu-page-settings');
                if (!res.ok) {
                    throw new Error('Failed to load menu page settings');
                }

                const settings = await res.json();
                menuPageSettings = {
                    isOpen: settings.isOpen !== false,
                    contactInfo: settings.contactInfo || ''
                };
            } catch (error) {
                console.error('Failed to load menu page settings:', error);
                menuPageSettings = {
                    isOpen: true,
                    contactInfo: ''
                };
            }

            applyMenuPageSettings();
        }

        // Fetch Snacks and Drinks from server (WITH LIVE STOCK CHECK)
        async function loadCategories() {
            try {
                const [invRes, resSnacks, resDrinks] = await Promise.all([
                    fetch('/inventory'),
                    fetch('/get-category/snacks'),
                    fetch('/get-category/drinks')
                ]);
                const liveInventory = await invRes.json();

                function isAvailable(itemId) {
                    const liveItem = liveInventory.find(i => String(i.id) === String(itemId));
                    if (!liveItem) return false;

                    const stockStr = liveItem.stockDisplay;
                    if (!stockStr) return false;

                    const match = stockStr.toString().match(/^([\d.]+)/);
                    const qty = match ? parseFloat(match[1]) : 0;
                    return qty > 0;
                }

                if (resSnacks.ok) {
                    const allSnacks = await resSnacks.json();
                    categoryData.snacks = allSnacks.filter(item => isAvailable(item.id));
                }

                if (resDrinks.ok) {
                    const allDrinks = await resDrinks.json();
                    categoryData.drinks = allDrinks.filter(item => isAvailable(item.id));
                }

                renderCategoryCards();
            } catch (e) {
                console.error("Error loading categories:", e);
            }
        }

        // Draw the category cards
        function renderCategoryCards() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = `
                <div class="cat-card" onclick="openCategoryModal('snacks')">
                    <div class="icon-wrapper">
                        <i data-lucide="cookie" style="width: 28px; height: 28px;"></i>
                    </div>
                    <div>
                        <h3>Snacks</h3>
                        <p>${categoryData.snacks.length} items available</p>
                    </div>
                </div>
                <div class="cat-card" onclick="openCategoryModal('drinks')">
                    <div class="icon-wrapper" style="background: #e0f2fe; color: #0284c7;">
                        <i data-lucide="cup-soda" style="width: 28px; height: 28px;"></i>
                    </div>
                    <div>
                        <h3>Drinks</h3>
                        <p>${categoryData.drinks.length} items available</p>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Open popup modal
        function openCategoryModal(category) {
            const items = categoryData[category];
            const iconName = category === 'snacks' ? 'cookie' : 'cup-soda';
            const iconColor = category === 'snacks' ? '#ea580c' : '#0284c7';

            const modalHtml = `
                <div id="custCategoryModal" class="modal-overlay" style="display:flex;">
                    <div class="modal-box">
                        <div class="modal-header">
                            <h2>
                                <i data-lucide="${iconName}" style="color: ${iconColor};"></i> ${category}
                            </h2>
                            <button onclick="closeModal()">
                                <i data-lucide="x" style="width: 20px; height: 20px;"></i>
                            </button>
                        </div>
                        
                        <div class="modal-body">
                            ${items.length === 0 ? `
                                <div style="text-align:center; padding: 30px 0;">
                                    <i data-lucide="package-open" style="width: 40px; height: 40px; color: #cbd5e0; margin-bottom: 10px;"></i>
                                    <p style="color:#64748b;">Sold out for today.</p>
                                </div>` : ''}
                            
                            ${items.map(item => `
                                <div class="cat-item">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-price">₱${parseFloat(item.sellingPrice || 0).toFixed(2)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            const existing = document.getElementById('custCategoryModal');
            if (existing) existing.remove();

            document.body.insertAdjacentHTML('beforeend', modalHtml);
            lucide.createIcons();
            
            // Close modal when clicking outside the box
            document.getElementById('custCategoryModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
        }

        function closeModal() {
            const modal = document.getElementById('custCategoryModal');
            if(modal) {
                modal.style.animation = 'none';
                modal.style.opacity = '0';
                setTimeout(() => modal.remove(), 200);
            }
        }

        let customerMenuUpdateChannel;

        function setupCustomerMenuRealtime() {
            try {
                customerMenuUpdateChannel = new BroadcastChannel('menu-updates');
                customerMenuUpdateChannel.onmessage = (event) => {
                    if (event.data && event.data.type === 'MENU_UPDATED') {
                        loadCustomerMenu();
                    }
                };
            } catch (e) {
                console.log('BroadcastChannel not supported for customer menu, using localStorage fallback');
                window.addEventListener('storage', (event) => {
                    if (event.key === 'menu-update-trigger') {
                        loadCustomerMenu();
                    }
                });
            }
        }

        function setupMenuPageSettingsRealtime() {
            try {
                realtimeSource = new EventSource('/realtime-events');
                realtimeSource.addEventListener('MENU_PAGE_SETTINGS_UPDATED', () => {
                    loadMenuPageSettings();
                });
            } catch (error) {
                console.error('Realtime settings connection failed:', error);
            }
        }

        // Load uploaded meals menu
        async function loadCustomerMenu() {
            try {
                const res = await fetch('/customer-menu');
                const items = await res.json();
                const container = document.getElementById('customerMenu');

                if (!items || items.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="utensils" style="width: 48px; height: 48px; color: #cbd5e0; margin-bottom: 16px;"></i>
                            <h3 style="color: #334155; font-size: 1.2rem; margin-bottom: 8px;">No meals available right now</h3>
                            <p style="color: #64748b;">The kitchen is preparing something delicious. Check back soon!</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                container.innerHTML = items.map(item => `
                    <div class="food-card">
                        <img src="${item.url}" alt="${item.name}" loading="lazy">
                        <div class="info">
                            <div class="name">${item.name}</div>
                            <div class="price">
                                <span style="font-size: 0.9rem; color: #64748b; font-weight: 500; margin-right: 2px;">₱</span>
                                ${parseFloat(item.price).toFixed(2)}
                            </div>
                        </div>
                    </div>
                `).join('');

                lucide.createIcons();

            } catch (error) {
                console.error("Failed to load menu:", error);
            }
        }

        // Initialize Page
        loadMenuPageSettings();
        loadCategories();
        setupCustomerMenuRealtime();
        setupMenuPageSettingsRealtime();
        loadCustomerMenu();

    </script>

</body>

</html>
